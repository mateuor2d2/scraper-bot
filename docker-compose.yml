version: "3.8"

services:
  scraper-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scraper-bot
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - TELOXIDE_TOKEN=${TELOXIDE_TOKEN}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_BASE_URL=${STRIPE_BASE_URL:-https://paas.cima20.io}
      - RUST_LOG=info
      - ADMIN_STATIC_DIR=/app/admin
    volumes:
      - scraper-data:/app/data
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  scraper-data:
    driver: local

networks:
  dokploy-network:
    external: true
