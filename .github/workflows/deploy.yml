name: Deploy to cima20paas

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CIMA20PAAS_DEPLOY_KEY }}
          log-public-key: false

      - name: Deploy to cima20paas
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@100.66.79.68 '
            cd /opt/scraper-bot && \
            git pull origin master && \
            docker compose up -d --build && \
            docker system prune -f
          '
